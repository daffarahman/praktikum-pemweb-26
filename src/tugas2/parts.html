<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daffa Model Kits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Google Sans Code', monospace;
            font-optical-sizing: auto;
            font-weight: 300;
            font-style: normal;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(12, 32, 92, 0.42), transparent 34%),
                radial-gradient(circle at bottom right, rgba(19, 62, 140, 0.34), transparent 30%),
                linear-gradient(180deg, #0b1635 0%, #102c63 52%, #0e1f45 100%);
            color: #10203f;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a2d6a;
            color: white;
            padding: 0rem 1rem;
            gap: 1rem;
            min-height: 100px;
        }

        .brand {
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .logo-image {
            height: 50px;
            border: 2px solid white;
        }

        .title-group {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 0.5rem;
            min-width: 0;
        }

        .title-primary {
            font-size: 1rem;
            margin: 0;
            padding: 0;
            font-weight: 100;
        }

        .title-secondary {
            font-size: 1.5rem;
            margin: 0;
            padding: 0;
            font-weight: 200;
        }

        .page-main {
            flex: 1;
            overflow: auto;
            padding: 1.25rem;
        }

        .parts-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: stretch;
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .part-card {
            flex: 1 1 180px;
            max-width: 240px;
            min-width: 150px;
            background: rgba(255, 255, 255, 0.78);
            padding: 0.75rem;
            backdrop-filter: blur(8px);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            transform-origin: center center;
            will-change: transform, box-shadow;
        }

        .part-card:hover {
            transform: rotate(-3deg) scale(1.05);
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.38);
        }

        .part-card img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #edf2fb;
        }

        .part-caption {
            margin: 0.7rem 0 0;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        @media (max-width: 700px) {
            .navbar {
                align-items: flex-start;
                flex-direction: column;
                padding: 1rem;
            }

            .title-group {
                justify-content: flex-start;
            }

            .page-main {
                padding: 0.9rem;
            }

            .part-card {
                flex-basis: 42%;
                max-width: none;
                min-width: 0;
            }
        }

        @media (max-width: 480px) {
            .part-card {
                flex-basis: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="navbar">
        <a href="index.html" class="brand">
            <img src="./img/dappa.png" alt="Logo" class="logo-image">
        </a>
        <div class="title-group">
            <h1 class="title-primary">Messerschmitt</h1>
            <h1 class="title-secondary">Bf 109 G-6</h1>
        </div>
    </header>

    <main class="page-main">
        <section class="parts-gallery" aria-label="Model kit parts gallery">
            <figure class="part-card">
                <img src="./img/parts/1.png" alt="Model part 1">
                <figcaption class="part-caption">Part 01</figcaption>
            </figure>
            <figure class="part-card">
                <img src="./img/parts/2.png" alt="Model part 2">
                <figcaption class="part-caption">Part 02</figcaption>
            </figure>
            <figure class="part-card">
                <img src="./img/parts/3.png" alt="Model part 3">
                <figcaption class="part-caption">Part 03</figcaption>
            </figure>
            <figure class="part-card">
                <img src="./img/parts/4.png" alt="Model part 4">
                <figcaption class="part-caption">Part 04</figcaption>
            </figure>
            <figure class="part-card">
                <img src="./img/parts/5.png" alt="Model part 5">
                <figcaption class="part-caption">Part 05</figcaption>
            </figure>
            <figure class="part-card">
                <img src="./img/parts/6.png" alt="Model part 6">
                <figcaption class="part-caption">Part 06</figcaption>
            </figure>
            <figure class="part-card">
                <img src="./img/parts/7.png" alt="Model part 7">
                <figcaption class="part-caption">Part 07</figcaption>
            </figure>
        </section>
    </main>
</body>

</html>
