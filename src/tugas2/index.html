<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daffa Model Kits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body
    style="font-family: 'Google Sans Code', monospace;font-optical-sizing: auto; font-weight: 300; font-style: normal; padding: 0; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;">

    <header
        style="display:flex; justify-content:space-between; align-items:center; background-color: #1a2d6a; color: white; padding: 0rem 1rem; gap: 1rem; min-height: 100px;">
        <a href="index.html" style="transition: transform 0.3s ease; flex-shrink: 0;">
            <img src="./img/dappa.png" alt="Logo" style="height: 50px; border: 2px solid white; ">
        </a>
        <div
            style="display: flex; align-items: baseline; justify-content: flex-end; flex-wrap: wrap; gap: 0.5rem; min-width: 0;">
            <h1 style="font-size: 1rem; margin: 0; padding: 0; font-weight: 100;">Messerschmitt</h1>
            <h1 style="font-size: 1.5rem; margin: 0; padding: 0; font-weight: 200;">Bf 109 G-6</h1>
        </div>
    </header>

    <main
        style="display: flex; flex-direction: row; flex-wrap: wrap; flex: 1; min-height: 0; padding: 2rem; gap: 1rem; align-items: center; justify-content: space-around; overflow-y: auto; overflow-x: hidden; background: radial-gradient(circle at top left, rgba(12, 32, 92, 0.42), transparent 34%), radial-gradient(circle at bottom right, rgba(19, 62, 140, 0.34), transparent 30%), linear-gradient(180deg, #0b1635 0%, #102c63 52%, #0e1f45 100%); background-attachment: fixed; background-size: cover; background-position: center;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; position: relative;">
            <a href="parts.html"
                style="display: flex; justify-content: center; align-items: center; position: relative;">
                <img src="./img/bf109g-nobg.png" alt="Bf 109 G-6"
                    style="width: 100%; height: auto; transform: rotate(-25deg);">
                <p
                    style="margin: 0; font-size: 1.5rem; font-weight: bold; color: #ffffff; position: absolute; z-index: 10; text-shadow: 0 0 10px rgba(107, 107, 107, 0.8), 0 0 20px rgba(26, 45, 106, 0.6);">
                    Parts</p>
            </a>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; position: relative;">
            <a href="manual.html"
                style="display: flex; justify-content: center; align-items: center; position: relative;">
                <img src="./img/manual-logo.jpg" alt="Manual"
                    style="width: 50%; height: auto; border: 2px solid white; transform: rotate(30deg); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);">
                <p
                    style="margin: 0; font-size: 1.5rem; font-weight: bold; color: #ffffff; position: absolute; z-index: 10; text-shadow: 0 0 10px rgba(107, 107, 107, 0.8), 0 0 20px rgba(26, 45, 106, 0.6);">
                    Assembly Manual</p>
            </a>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; position: relative;">
            <a href="gallery.html"
                style="display: flex; justify-content: center; align-items: center; position: relative;">
                <img src="./img/gallery.png" alt="Manual" style="width: 25%; height: auto; border: 2px solid white;">
                <p
                    style="margin: 0; font-size: 1.5rem; font-weight: bold; color: #ffffff; position: absolute; z-index: 10; text-shadow: 0 0 10px rgba(107, 107, 107, 0.8), 0 0 20px rgba(26, 45, 106, 0.6);">
                    Gallery</p>
            </a>
        </div>
    </main>
</body>

</html>
