<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Kit Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/gallery.css">
</head>

<body>
    <header class="navbar">
        <a href="index.html" class="brand">
            <img src="./img/dappa.png" alt="Logo" class="logo-image">
        </a>
        <div class="title-group">
            <h1 class="title-primary">Messerschmitt</h1>
            <h1 class="title-secondary">Bf 109 G-6</h1>
        </div>
    </header>

    <main class="page-main">
        <section class="gallery-grid" aria-label="Model kit gallery">
            <figure class="gallery-card">
                <img src="./img/gallery/1.jpg" alt="Final result of the model">
            </figure>
            <figure class="gallery-card">
                <img src="./img/gallery/2.jpg" alt="The box and the finished model">
            </figure>
            <figure class="gallery-card">
                <img src="./img/gallery/3.jpg" alt="Bottom side of the model">
            </figure>
            <figure class="gallery-card">
                <img src="./img/gallery/4.jpg" alt="Propeller of the model">
            </figure>
        </section>
    </main>
</body>

</html>
